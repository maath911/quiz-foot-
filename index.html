<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #0047a8;
    --green-light: #0055cc;
    --green-glow: #4d9fff;
    --yellow: #f5c518;
    --red: #e63946;
    --white: #f0f0f0;
    --dark: #06091a;
    --card: rgba(255,255,255,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark); color: var(--white);
    font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 60%, rgba(200,16,46,0.28) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,71,168,0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(200,16,46,0.15) 0%, transparent 50%);
  }
  .field-lines {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 58px, #fff 58px, #fff 60px),
      repeating-linear-gradient(90deg, transparent, transparent 58px, #fff 58px, #fff 60px);
  }
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 4px; color: var(--green-glow);
    text-shadow: 0 0 40px rgba(77,159,255,0.5), 0 4px 0 rgba(0,0,0,0.5); line-height: 1;
  }
  .subtitle { font-size: 1.1rem; opacity: 0.6; margin-top: 8px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .card {
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 28px; backdrop-filter: blur(10px); width: 100%; max-width: 500px;
  }
  label { display: block; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 8px; }
  input[type="text"] {
    width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 12px 16px; color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 700; outline: none; transition: border-color 0.2s, background 0.2s;
  }
  input[type="text"]:focus { border-color: var(--green-glow); background: rgba(0,71,168,0.1); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--green-light); border: none; border-radius: 12px;
    color: #fff; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 900;
    padding: 14px 28px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
  }
  .btn:hover { background: var(--green-glow); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(77,159,255,0.35); }
  .btn:active { transform: translateY(0); }
  .btn.btn-big { font-size: 1.2rem; padding: 18px 40px; width: 100%; max-width: 320px; }
  .btn.btn-ghost { background: transparent; border: 2px solid rgba(255,255,255,0.2); }
  .btn.btn-ghost:hover { background: rgba(255,255,255,0.08); }
  .btn.btn-yellow { background: var(--yellow); color: #111; }
  .btn.btn-yellow:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  /* SETUP */
  #setup .card { margin-top: 16px; }
  .cnt-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .cnt-btn {
    flex: 1; min-width: 55px; background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12); border-radius: 10px;
    color: #fff; font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
    padding: 12px; cursor: pointer; transition: all 0.2s;
  }
  .cnt-btn.selected { border-color: var(--green-glow); background: rgba(0,71,168,0.2); color: var(--green-glow); }
  .player-inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .player-input-row { display: flex; align-items: center; gap: 10px; }
  .player-badge { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 900; flex-shrink: 0; }
  /* ROUNDS */
  #rounds-screen { gap: 20px; }
  #rounds-screen h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 3px; color: var(--green-glow); }
  .rounds-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 260px; }
  .round-btn {
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 14px; color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 1.4rem; font-weight: 900; padding: 0; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    aspect-ratio: 1 / 1; width: 100%;
  }
  .round-btn:hover { border-color: var(--green-glow); background: rgba(0,71,168,0.15); }
  .round-btn.selected { border-color: var(--green-glow); background: rgba(0,71,168,0.3); color: var(--green-glow); }
  .round-btn span { font-size: 0.7rem; opacity: 0.6; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  /* DIFFICULTY */
  #difficulty { gap: 20px; }
  #difficulty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 3px; color: var(--green-glow); }
  .current-player-badge {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 10px 20px;
  }
  .diff-grid { display: grid; grid-template-columns: 1fr; gap: 14px; width: 100%; max-width: 400px; }
  .diff-card {
    background: var(--card); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 18px 22px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: space-between;
  }
  .diff-card:hover { transform: translateX(6px); }
  .diff-card.easy:hover, .diff-card.easy.selected { border-color: #4d9fff; background: rgba(77,159,255,0.12); }
  .diff-card.medium:hover, .diff-card.medium.selected { border-color: var(--yellow); background: rgba(245,197,24,0.12); }
  .diff-card.hard:hover, .diff-card.hard.selected { border-color: var(--red); background: rgba(230,57,70,0.12); }
  .diff-name { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
  .diff-pts { font-size: 0.85rem; opacity: 0.6; }
  /* QUIZ */
  #quiz { gap: 16px; justify-content: flex-start; padding-top: 30px; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 640px; flex-wrap: wrap; gap: 10px; }
  .scoreboard { display: flex; gap: 8px; flex-wrap: wrap; }
  .score-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 6px 14px; font-size: 0.85rem; font-weight: 700; transition: all 0.3s;
  }
  .score-chip.active-player { border-color: var(--green-glow); background: rgba(77,159,255,0.15); box-shadow: 0 0 16px rgba(77,159,255,0.25); }
  .q-counter { font-size: 0.8rem; opacity: 0.5; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .turn-banner {
    width: 100%; max-width: 640px; display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-radius: 12px; font-weight: 900; font-size: 1rem;
    background: rgba(0,71,168,0.15); border: 1px solid rgba(77,159,255,0.35); flex-wrap: wrap;
  }
  .diff-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
  }
  .diff-badge.easy { background: rgba(77,159,255,0.2); color: #4d9fff; }
  .diff-badge.medium { background: rgba(245,197,24,0.2); color: var(--yellow); }
  .diff-badge.hard { background: rgba(230,57,70,0.2); color: var(--red); }
  .question-card {
    width: 100%; max-width: 640px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px; padding: 28px;
  }
  .question-text { font-size: 1.2rem; font-weight: 700; line-height: 1.5; margin-bottom: 20px; }
  .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width:480px) { .answers-grid { grid-template-columns: 1fr; } }
  .answer-btn {
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 700; padding: 14px 16px; cursor: pointer;
    transition: all 0.2s; text-align: left; display: flex; align-items: center; gap: 10px;
  }
  .answer-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
  .answer-btn.correct { border-color: #4d9fff; background: rgba(77,159,255,0.2); animation: pop 0.3s ease; }
  .answer-btn.wrong { border-color: var(--red); background: rgba(230,57,70,0.15); }
  .answer-btn:disabled { cursor: default; }
  .answer-letter {
    width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 900; flex-shrink: 0;
  }
  .timer-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .timer-fill { height: 100%; background: var(--green-glow); border-radius: 2px; transition: width 1s linear; }
  /* RESULT */
  #result { gap: 20px; }
  #result h2 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--yellow); letter-spacing: 3px; text-align:center; }
  .result-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
  .result-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 18px;
  }
  .result-row.winner { border-color: var(--yellow); background: rgba(245,197,24,0.1); }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.35s ease forwards; }
  .rounds-progress { font-size:0.8rem; opacity:0.5; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="field-lines"></div>

<!-- HOME -->
<div id="home" class="screen active">
  <div style="text-align:center; animation: fadeIn 0.5s ease;">
    <div style="font-size:4rem;">⚽</div>
    <h1>FOOTBALL<br>QUIZ</h1>
    <p class="subtitle">Le quiz des champions</p>
    <div style="margin-top: 40px;">
      <button class="btn btn-big" onclick="showScreen('setup')">🚀 Commencer</button>
    </div>
    <p style="margin-top: 40px; font-size: 0.75rem; opacity: 0.35; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">Jeu créé par Mathéo GONCALVES</p>
  </div>
</div>

<!-- SETUP PLAYERS -->
<div id="setup" class="screen">
  <div style="text-align:center; margin-bottom: 16px;" class="fade-in">
    <h1 style="font-size:3rem;">JOUEURS</h1>
    <p class="subtitle">Combien de joueurs ?</p>
  </div>
  <div class="card fade-in">
    <label>Nombre de joueurs</label>
    <div class="cnt-row" id="cntBtns">
      <button class="cnt-btn" onclick="setPlayerCount(1)">1</button>
      <button class="cnt-btn selected" onclick="setPlayerCount(2)">2</button>
      <button class="cnt-btn" onclick="setPlayerCount(3)">3</button>
      <button class="cnt-btn" onclick="setPlayerCount(4)">4</button>
    </div>
    <label>Noms des joueurs</label>
    <div class="player-inputs" id="playerInputs"></div>
    <button class="btn" style="width:100%" onclick="goToRounds()">Suivant →</button>
  </div>
  <button class="btn btn-ghost" style="margin-top:12px;" onclick="showScreen('home')">← Retour</button>
</div>

<!-- ROUNDS SELECTION -->
<div id="rounds-screen" class="screen">
  <h2 class="fade-in">NOMBRE DE TOURS</h2>
  <p class="fade-in" style="opacity:0.5; font-size:0.9rem; margin-top:-10px; letter-spacing:1px;">Par joueur</p>
  <div class="rounds-grid fade-in">
    <button class="round-btn" onclick="setRounds(3)">3<span>Tours</span></button>
    <button class="round-btn selected" onclick="setRounds(5)">5<span>Tours</span></button>
    <button class="round-btn" onclick="setRounds(7)">7<span>Tours</span></button>
    <button class="round-btn" onclick="setRounds(10)">10<span>Tours</span></button>
  </div>
  <div class="fade-in" style="text-align:center; opacity:0.5; font-size:0.85rem; margin-top:4px;" id="roundsInfo"></div>
  <div style="display:flex; gap:12px; margin-top:8px;" class="fade-in">
    <button class="btn btn-ghost" onclick="showScreen('setup')">← Retour</button>
    <button class="btn" onclick="startGame()">✅ Lancer la partie !</button>
  </div>
</div>

<!-- DIFFICULTY -->
<div id="difficulty" class="screen">
  <div class="current-player-badge fade-in" id="diffPlayerBadge"></div>
  <h2 class="fade-in" style="font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:3px; color:var(--green-glow);">CHOIX DE DIFFICULTÉ</h2>
  <div class="rounds-progress fade-in" id="roundsProgress"></div>
  <div class="diff-grid fade-in">
    <div class="diff-card easy" onclick="chooseDifficulty('easy')">
      <div>
        <div class="diff-name" style="color:#4d9fff;">🔵 Facile</div>
        <div class="diff-pts">1 point par bonne réponse</div>
      </div>
    </div>
    <div class="diff-card medium" onclick="chooseDifficulty('medium')">
      <div>
        <div class="diff-name" style="color:#f5c518;">🟡 Moyen</div>
        <div class="diff-pts">2 points par bonne réponse</div>
      </div>
    </div>
    <div class="diff-card hard" onclick="chooseDifficulty('hard')">
      <div>
        <div class="diff-name" style="color:#e63946;">🔴 Difficile</div>
        <div class="diff-pts">3 points par bonne réponse</div>
      </div>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header fade-in">
    <div class="scoreboard" id="scoreboard"></div>
    <div class="q-counter" id="qCounter"></div>
  </div>
  <div class="turn-banner fade-in" id="turnBanner"></div>
  <div class="question-card fade-in">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span class="diff-badge" id="diffBadge"></span>
      <span id="timerText" style="font-size:0.85rem; opacity:0.6; font-weight:700;"></span>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="question-text" id="questionText"></div>
    <div class="answers-grid" id="answersGrid"></div>
  </div>
  <div id="feedbackArea" style="margin-top:8px; font-size:1rem; font-weight:700; min-height:30px; text-align:center;"></div>
  <button class="btn" id="nextBtn" style="display:none; margin-top:8px;" onclick="nextTurn()">Tour suivant ➡️</button>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div style="font-size:3rem;" class="fade-in">🏆</div>
  <h2 class="fade-in" id="resultTitle">FIN DU QUIZ !</h2>
  <div class="result-list fade-in" id="resultList"></div>
  <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:20px;" class="fade-in">
    <button class="btn btn-yellow" onclick="restartGame()">🔄 Rejouer</button>
    <button class="btn btn-ghost" onclick="showScreen('home')">🏠 Accueil</button>
  </div>
</div>

<script>
const COLORS = ['#4d9fff','#c8102e','#f5c518','#a855f7'];
const AVATARS = ['⚽','🥅','👟','🏆'];
const DIFF_LABELS = { easy: 'Facile', medium: 'Moyen', hard: 'Difficile' };
const DIFF_PTS = { easy: 1, medium: 2, hard: 3 };
const LETTERS = ['A','B','C','D'];

const QUESTIONS = {
easy: [
  { q:"Combien de joueurs y a-t-il dans une équipe de football sur le terrain ?", a:["11","10","12","9"], correct:0 },
  { q:"Quel pays a remporté la Coupe du Monde 2018 ?", a:["France","Croatie","Allemagne","Brésil"], correct:0 },
  { q:"Quelle est la durée réglementaire d'un match de football ?", a:["90 minutes","80 minutes","100 minutes","120 minutes"], correct:0 },
  { q:"Quel club est surnommé 'Les Blaugrana' ?", a:["FC Barcelone","Real Madrid","PSG","Bayern Munich"], correct:0 },
  { q:"Dans quel pays joue le club de Manchester United ?", a:["Angleterre","Écosse","Irlande","Pays de Galles"], correct:0 },
  { q:"Qui est surnommé 'La Pulga' (La Puce) ?", a:["Lionel Messi","Cristiano Ronaldo","Neymar","Mbappé"], correct:0 },

  { q:"Quelle couleur reçoit un joueur lorsqu'il est expulsé ?", a:["Carton rouge","Carton jaune","Carton vert","Carton bleu"], correct:0 },

  { q:"Quelle compétition oppose les clubs européens d'élite ?", a:["Ligue des Champions","Copa América","Euro","World Cup"], correct:0 },
  { q:"Quel pays a remporté le plus de Coupes du Monde ?", a:["Brésil","Allemagne","Italie","France"], correct:0 },
  { q:"Quel club est surnommé 'Les Merengues' ?", a:["Real Madrid","Atlético Madrid","FC Barcelone","Juventus"], correct:0 },
  { q:"Kylian Mbappé est de quelle nationalité ?", a:["Française","Espagnole","Belge","Portugaise"], correct:0 },
  { q:"Quelle est la couleur du maillot de l'équipe de France à domicile ?", a:["Bleu","Rouge","Blanc","Vert"], correct:0 },
  { q:"Quelle est la forme du terrain de football ?", a:["Rectangle","Carré","Cercle","Losange"], correct:0 },

  { q:"Quel pays organise la Coupe du Monde 2026 ?", a:["USA/Canada/Mexique","Espagne","France","Brésil"], correct:0 },

  { q:"Quelle équipe porte le surnom 'Les Diables Rouges' ?", a:["Belgique","Espagne","Portugal","Pays-Bas"], correct:0 },
  { q:"Combien de joueurs participent à un tir au but (péno) ?", a:["1 tireur + 1 gardien","2 tireurs","3 joueurs","Toute l'équipe"], correct:0 },
  { q:"Quel club anglais est surnommé 'The Blues' à Chelsea ?", a:["Chelsea","Everton","Manchester City","Leicester"], correct:0 },
  { q:"Quelle est la surface de réparation dans le football ?", a:["La surface où le gardien peut utiliser ses mains","La surface de jeu principale","La zone de corner","Le rond central"], correct:0 },
  { q:"Qui est l'entraîneur de l'équipe de France championne du monde 2018 ?", a:["Didier Deschamps","Laurent Blanc","Raymond Domenech","Zinédine Zidane"], correct:0 },
  { q:"Quel pays a remporté l'Euro 2021 ?", a:["Italie","Angleterre","Espagne","France"], correct:0 },
  { q:"Combien de joueurs forment la ligne défensive dans un 4-4-2 ?", a:["4","3","5","2"], correct:0 },
  { q:"Dans quelle ville se trouve le stade du Parc des Princes ?", a:["Paris","Lyon","Marseille","Bordeaux"], correct:0 },
  { q:"Quel est le rôle du gardien de but ?", a:["Protéger les buts","Marquer des buts","Distribuer le jeu","Tacler les attaquants"], correct:0 },

  { q:"Quel joueur brésilien porte le numéro 10 dans la tradition ?", a:["Le meneur de jeu","Le gardien","Le défenseur central","L'avant-centre"], correct:0 },
  { q:"Combien de joueurs sont sur le banc de touche maximum (hors remplaçants entrants) ?", a:["Cela dépend de la compétition","Toujours 7","Toujours 5","Toujours 11"], correct:0 },

let players = [];
let currentPlayerIdx = 0;
let currentDifficulty = null;
let selectedRounds = 5;
let usedQuestions = { easy: new Set(), medium: new Set(), hard: new Set() };
let questionPool = { easy: [], medium: [], hard: [] };
let currentRound = 0; // total turns done
let totalTurns = 0;
let timerInterval = null;
let timerValue = 20;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setPlayerCount(n) {
  document.querySelectorAll('.cnt-btn').forEach((b,i) => b.classList.toggle('selected', i+1===n));
  const container = document.getElementById('playerInputs');
  container.innerHTML = '';
  for(let i = 0; i < n; i++) {
    container.innerHTML += `
      <div class="player-input-row">
        <div class="player-badge" style="background:${COLORS[i]}20;color:${COLORS[i]};border:2px solid ${COLORS[i]};">${AVATARS[i]}</div>
        <input type="text" id="pname${i}" placeholder="Joueur ${i+1}" value="${players[i]?.name||''}">
      </div>`;
  }
  updateRoundsInfo();
}

function goToRounds() {
  const n = [...document.querySelectorAll('.cnt-btn')].findIndex(b => b.classList.contains('selected')) + 1;
  players = [];
  for(let i = 0; i < n; i++) {
    const v = document.getElementById('pname'+i)?.value.trim() || `Joueur ${i+1}`;
    players.push({ name: v, score: 0, color: COLORS[i], avatar: AVATARS[i] });
  }
  updateRoundsInfo();
  showScreen('rounds-screen');
}

function setRounds(n) {
  selectedRounds = n;
  document.querySelectorAll('.round-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  updateRoundsInfo();
}

function updateRoundsInfo() {
  const n = players.length || ([...document.querySelectorAll('.cnt-btn')].findIndex(b => b.classList.contains('selected')) + 1);
  const el = document.getElementById('roundsInfo');
  if(el) el.textContent = `Soit ${selectedRounds * n} questions au total (${n} joueur${n>1?'s':''} × ${selectedRounds} tours)`;
}

function startGame() {
  totalTurns = selectedRounds * players.length;
  currentRound = 0;
  currentPlayerIdx = 0;
  players.forEach(p => p.score = 0);
  usedQuestions = { easy: new Set(), medium: new Set(), hard: new Set() };
  questionPool = {
    easy: shuffle([...Array(QUESTIONS.easy.length).keys()]),
    medium: shuffle([...Array(QUESTIONS.medium.length).keys()]),
    hard: shuffle([...Array(QUESTIONS.hard.length).keys()])
  };
  showDifficultyScreen();
}

function shuffle(arr) {
  for(let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function showDifficultyScreen() {
  if(currentRound >= totalTurns) { showResult(); return; }
  const p = players[currentPlayerIdx];
  const roundNum = Math.floor(currentRound / players.length) + 1;
  document.getElementById('diffPlayerBadge').innerHTML = `
    <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${p.color}20;color:${p.color};border:2px solid ${p.color};">${p.avatar}</div>
    <span style="font-weight:900;font-size:1.1rem;">${p.name}</span>
    <span style="opacity:0.5;font-size:0.85rem;">— Choisis ta difficulté</span>
  `;
  document.getElementById('roundsProgress').textContent = `Tour ${roundNum} / ${selectedRounds}  •  Question ${currentRound+1} / ${totalTurns}`;
  showScreen('difficulty');
}

function chooseDifficulty(diff) {
  currentDifficulty = diff;
  if(questionPool[diff].length === 0) {
    // Ran out — reshuffle excluding none (all used, allow repeats only after full cycle)
    questionPool[diff] = shuffle([...Array(QUESTIONS[diff].length).keys()]);
    usedQuestions[diff].clear();
  }
  showQuestion();
}

function showQuestion() {
  const idx = questionPool[currentDifficulty].pop();
  const q = QUESTIONS[currentDifficulty][idx];
  const p = players[currentPlayerIdx];
  showScreen('quiz');

  document.getElementById('scoreboard').innerHTML = players.map((pl,i) =>
    `<div class="score-chip ${i===currentPlayerIdx?'active-player':''}">
      <span>${pl.avatar}</span>
      <span style="color:${pl.color}">${pl.name}</span>
      <span style="font-size:0.9rem;color:var(--green-glow);">${pl.score}pts</span>
    </div>`).join('');

  const roundNum = Math.floor(currentRound / players.length) + 1;
  document.getElementById('qCounter').textContent = `Tour ${roundNum}/${selectedRounds} • Q${currentRound+1}/${totalTurns}`;

  document.getElementById('turnBanner').innerHTML = `
    <span>${p.avatar}</span>
    <span>Tour de <strong style="color:${p.color}">${p.name}</strong></span>
    <span class="diff-badge ${currentDifficulty}">${DIFF_LABELS[currentDifficulty]} +${DIFF_PTS[currentDifficulty]}pt</span>
  `;

  const badge = document.getElementById('diffBadge');
  badge.className = `diff-badge ${currentDifficulty}`;
  badge.textContent = DIFF_LABELS[currentDifficulty];
  document.getElementById('questionText').textContent = q.q;

  const shuffled = shuffleAnswers(q.a, q.correct);
  document.getElementById('answersGrid').innerHTML = shuffled.map((ans, i) =>
    `<button class="answer-btn" onclick="checkAnswer(${i}, ${shuffled.correctIdx}, this)">
      <span class="answer-letter">${LETTERS[i]}</span>${ans}
    </button>`).join('');

  document.getElementById('feedbackArea').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  startTimer();
}

function shuffleAnswers(answers, correctIdx) {
  const pairs = answers.map((a,i) => ({a, isCorrect: i===correctIdx}));
  for(let i = pairs.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [pairs[i],pairs[j]] = [pairs[j],pairs[i]];
  }
  const result = pairs.map(p => p.a);
  result.correctIdx = pairs.findIndex(p => p.isCorrect);
  return result;
}

function startTimer() {
  clearInterval(timerInterval);
  timerValue = 20;
  document.getElementById('timerFill').style.width = '100%';
  document.getElementById('timerFill').style.background = 'var(--green-glow)';
  document.getElementById('timerText').textContent = `⏱ ${timerValue}s`;
  timerInterval = setInterval(() => {
    timerValue--;
    const pct = (timerValue/20)*100;
    document.getElementById('timerFill').style.width = pct+'%';
    document.getElementById('timerFill').style.background = timerValue > 10 ? 'var(--green-glow)' : timerValue > 5 ? 'var(--yellow)' : 'var(--red)';
    document.getElementById('timerText').textContent = `⏱ ${timerValue}s`;
    if(timerValue <= 0) { clearInterval(timerInterval); timeOut(); }
  }, 1000);
}

function timeOut() {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
  document.getElementById('feedbackArea').innerHTML = `<span style="color:var(--red);">⏰ Temps écoulé ! Aucun point.</span>`;
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function checkAnswer(chosen, correct, btn) {
  clearInterval(timerInterval);
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => b.disabled = true);
  btns[correct].classList.add('correct');
  if(chosen === correct) {
    const pts = DIFF_PTS[currentDifficulty];
    players[currentPlayerIdx].score += pts;
    btn.classList.add('correct');
    document.getElementById('feedbackArea').innerHTML = `<span style="color:#4d9fff;">✅ Correct ! +${pts} point${pts>1?'s':''} 🎉</span>`;
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedbackArea').innerHTML = `<span style="color:var(--red);">❌ Raté ! Bonne réponse : <strong>${btns[correct].textContent.slice(1)}</strong></span>`;
  }
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function nextTurn() {
  currentRound++;
  currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
  if(currentRound >= totalTurns) showResult();
  else showDifficultyScreen();
}

function showResult() {
  showScreen('result');
  const sorted = [...players].sort((a,b) => b.score - a.score);
  document.getElementById('resultTitle').textContent = `🏆 ${sorted[0].name} Gagne !`;
  const medals = ['🥇','🥈','🥉','4️⃣'];
  document.getElementById('resultList').innerHTML = sorted.map((p,i) => `
    <div class="result-row ${i===0?'winner':''}">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:1.5rem;">${medals[i]}</span>
        <span style="font-size:1.3rem;">${p.avatar}</span>
        <span style="font-weight:900;color:${p.color};">${p.name}</span>
      </div>
      <span style="font-family:'Bebas Neue';font-size:1.8rem;color:var(--green-glow);">${p.score} pts</span>
    </div>`).join('');
}

function restartGame() {
  players.forEach(p => p.score = 0);
  currentRound = 0;
  currentPlayerIdx = 0;
  usedQuestions = { easy: new Set(), medium: new Set(), hard: new Set() };
  questionPool = {
    easy: shuffle([...Array(QUESTIONS.easy.length).keys()]),
    medium: shuffle([...Array(QUESTIONS.medium.length).keys()]),
    hard: shuffle([...Array(QUESTIONS.hard.length).keys()])
  };
  showDifficultyScreen();
}

// Init
setPlayerCount(2);
updateRoundsInfo();
</script>
</body>
</html>
